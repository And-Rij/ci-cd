name: Next.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Сервер, на якому все буде крутитися

    steps:
      # 1. Клонуємо код з репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Встановлюємо Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Кешуємо npm для швидкості

      # 3. Встановлюємо залежності
      - name: Install dependencies
        run: npm ci

      # 4. Запускаємо лінтер (CI частина)
      - name: Run Biome
        run: npm run lint

      # 5. Перевіряємо, чи проект взагалі збирається (CI частина)
      - name: Build Next.js app
        run: npm run build
